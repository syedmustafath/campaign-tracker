/* ---------- PN Scheduling ---------- */
// Frequency targets (total PNs across the whole range), by priority.
const PN_FREQ={ urgent:[3,4], high:[2,3], normal:[1,2], low:[0,1] };
const PN_DAILY_CAP=2;
// Scratchpad state. ticks: Set of "campaignId|YYYY-MM-DD". Resets each open.
let pnState={ from:"", to:"", cats:new Set(), stats:new Set(["progress"]), pris:new Set(), ticks:new Set() };

function nextMonthRange(){
  const now=new Date();
  const first=new Date(now.getFullYear(), now.getMonth()+1, 1);
  const last=new Date(now.getFullYear(), now.getMonth()+2, 0); // day 0 of month after = last day of next month
  return { from:isoOf(first), to:isoOf(last) };
}
function dayList(fromISO,toISO){
  if(!fromISO||!toISO)return [];
  const days=[]; let cur=new Date(fromISO); cur.setHours(0,0,0,0);
  const end=new Date(toISO); end.setHours(0,0,0,0);
  while(cur<=end && days.length<400){ days.push(isoOf(cur)); cur.setDate(cur.getDate()+1); }
  return days;
}
function pnFilteredList(){
  return state.filter(c=>{
    if(pnState.cats.size&&!pnState.cats.has(c.category))return false;
    if(pnState.stats.size&&!pnState.stats.has(computeStatus(c)))return false;
    if(pnState.pris.size&&!pnState.pris.has(c.priority))return false;
    return true;
  });
}
function pnKey(cid,day){return cid+'|'+day;}

// Days within [from,to] on which a campaign is actually running (falls back to whole
// range if the campaign has no dates set).
function campaignActiveDays(c,days){
  if(!c.start&&!c.end)return days.slice();
  return days.filter(d=>{
    if(c.start&&d<c.start)return false;
    if(c.end&&d>c.end)return false;
    return true;
  });
}

// Auto-generate a schedule: for each campaign (urgent→high→normal), aim for the top of
// its frequency band, placing PNs on its active days, spread as evenly as possible, only
// where the day still has capacity (< 2 PNs). Returns a fresh Set of ticks.
function pnAutoGenerate(){
  const days=dayList(pnState.from,pnState.to);
  const list=pnFilteredList();
  const dayCount={}; days.forEach(d=>dayCount[d]=0);
  const ticks=new Set();
  const order={urgent:0,high:1,normal:2,low:3};
  const sorted=[...list].sort((a,b)=>(order[a.priority]??9)-(order[b.priority]??9));
  sorted.forEach(c=>{
    const band=PN_FREQ[c.priority]||[0,0];
    let target=band[1];                    // aim for the top of the band
    const active=campaignActiveDays(c,days);
    if(!active.length||target<=0)return;
    // Evenly spaced candidate positions across the active window.
    const placed=[];
    const tryPlace=(pref)=>{
      // pref is an index into active; search outward for a day under cap and not already used by this campaign
      for(let off=0; off<active.length; off++){
        for(const s of (off===0?[0]:[off,-off])){
          const idx=pref+s;
          if(idx<0||idx>=active.length)continue;
          const d=active[idx];
          if(dayCount[d]<PN_DAILY_CAP && !ticks.has(pnKey(c.id,d))){
            ticks.add(pnKey(c.id,d)); dayCount[d]++; placed.push(idx); return true;
          }
        }
      }
      return false;
    };
    for(let i=0;i<target;i++){
      const pref=Math.round(((i+0.5)/target)*(active.length-1));
      if(!tryPlace(pref))break;            // capacity exhausted for this campaign
    }
  });
  return ticks;
}

function openPNSchedule(){
  const def=nextMonthRange();
  if(!pnState.from)pnState.from=def.from;
  if(!pnState.to)pnState.to=def.to;
  if(!pnState.ticks.size)pnState.ticks=pnAutoGenerate();  // first open: auto-fill
  renderPNModal();
  document.getElementById('pnOverlay').classList.add('open');
}
function closePN(){document.getElementById('pnOverlay').classList.remove('open');}

function pnChip(grp,val,label,active){
  return `<button class="h-chip ${active?'on':''}" onclick="pnToggleFilter('${grp}','${esc(String(val))}')">${esc(label)}</button>`;
}
function pnToggleFilter(grp,val){
  const set=grp==='cat'?pnState.cats:grp==='status'?pnState.stats:pnState.pris;
  set.has(val)?set.delete(val):set.add(val);
  renderPNModal();
}
function pnSetRange(which,v){ pnState[which]=v; renderPNModal(); }
function pnRegenerate(){ pnState.ticks=pnAutoGenerate(); renderPNModal(); }
function pnClearAll(){ pnState.ticks=new Set(); renderPNModal(); }

function pnDayTotal(day,list){
  return list.reduce((n,c)=>n+(pnState.ticks.has(pnKey(c.id,day))?1:0),0);
}
function pnToggleTick(cid,day){
  const k=pnKey(cid,day);
  pnState.ticks.has(k)?pnState.ticks.delete(k):pnState.ticks.add(k);
  refreshPNCounts();
}
// Update per-day column totals, per-campaign totals, over-cap flags, band flags — no full re-render.
function refreshPNCounts(){
  const days=dayList(pnState.from,pnState.to);
  const list=pnFilteredList();
  days.forEach(d=>{
    const t=pnDayTotal(d,list);
    const cell=document.querySelector(`.pn-coltot[data-day="${d}"]`);
    if(cell){cell.textContent=t||'';cell.classList.toggle('over',t>PN_DAILY_CAP);}
    document.querySelectorAll(`.pn-daycol[data-day="${d}"]`).forEach(td=>td.classList.toggle('overday',t>PN_DAILY_CAP));
  });
  list.forEach(c=>{
    const tot=days.reduce((n,d)=>n+(pnState.ticks.has(pnKey(c.id,d))?1:0),0);
    const tc=document.querySelector(`.pn-total[data-cid="${c.id}"]`);
    if(tc){ tc.textContent=tot; const band=PN_FREQ[c.priority]||[0,0];
      tc.classList.toggle('under',tot<band[0]); tc.classList.toggle('good',tot>=band[0]&&tot<=band[1]); tc.classList.toggle('over',tot>band[1]); }
  });
  const gt=document.getElementById('pn_grand');
  if(gt) gt.textContent=[...pnState.ticks].filter(k=>{const cid=k.split('|')[0];return list.some(c=>c.id===cid);}).length;
}

function fmtDay(d){ return new Date(d).toLocaleDateString('en-GB',{day:'2-digit'}); }
function fmtDow(d){ return new Date(d).toLocaleDateString('en-US',{weekday:'narrow'}); }
function fmtMonHdr(d){ return new Date(d).toLocaleDateString('en-GB',{month:'short',year:'numeric'}); }

function renderPNModal(){
  const days=dayList(pnState.from,pnState.to);
  const list=pnFilteredList();
  const catChips=CAT_ORDER.map(k=>pnChip('cat',k,(CATS[k]||{}).label||k,pnState.cats.has(k))).join('');
  const statChips=EXPORT_STATUSES.map(([v,l])=>pnChip('status',v,l,pnState.stats.has(v))).join('');
  const priChips=PRIORITIES.map(p=>pnChip('priority',p,PRI_LABEL[p],pnState.pris.has(p))).join('');

  let table='';
  if(!days.length){
    table=`<div class="h-empty">Pick a valid date range to build the schedule.</div>`;
  }else if(!list.length){
    table=`<div class="h-empty">No campaigns match these filters.</div>`;
  }else{
    const dhead=days.map(d=>{const we=[0,6].includes(new Date(d).getDay());
      return `<th class="pn-dh ${we?'wknd':''}" title="${d}"><span class="pn-dow">${fmtDow(d)}</span><span class="pn-dnum">${fmtDay(d)}</span></th>`;}).join('');
    const body=list.map(c=>{
      const active=new Set(campaignActiveDays(c,days));
      const cells=days.map(d=>{
        const on=pnState.ticks.has(pnKey(c.id,d));
        const inactive=!active.has(d);
        const we=[0,6].includes(new Date(d).getDay());
        return `<td class="pn-daycol ${we?'wknd':''} ${inactive?'inactive':''}" data-day="${d}"><input type="checkbox" ${on?'checked':''} onchange="pnToggleTick('${c.id}','${d}')"></td>`;
      }).join('');
      const days_c=days.reduce((n,d)=>n+(pnState.ticks.has(pnKey(c.id,d))?1:0),0);
      const band=PN_FREQ[c.priority]||[0,0];
      const cls=days_c<band[0]?'under':(days_c<=band[1]?'good':'over');
      return `<tr>
        <td class="h-name"><span class="h-dot" style="--cd:var(${(CATS[c.category]||{}).cat})"></span><span class="h-nm" title="${esc(c.name)}">${esc(c.name)}</span><span class="h-pri pri-${c.priority}">${PRI_LABEL[c.priority]}</span></td>
        <td class="pn-band" title="Target for ${PRI_LABEL[c.priority]}">${band[0]}–${band[1]}</td>
        ${cells}
        <td class="pn-total ${cls}" data-cid="${c.id}">${days_c}</td>
      </tr>`;
    }).join('');
    const grand=[...pnState.ticks].filter(k=>{const cid=k.split('|')[0];return list.some(c=>c.id===cid);}).length;
    table=`<div class="h-tablewrap pn-wrap"><table class="h-table pn-table">
      <thead><tr><th class="h-name-h">Campaign (${list.length})</th><th class="pn-band-h">Target</th>${dhead}<th class="h-total-h">Total</th></tr></thead>
      <tbody>${body}</tbody>
      <tfoot><tr><td class="h-name-h">PNs / day</td><td class="pn-band-h"></td>${days.map(d=>{
        const t=pnDayTotal(d,list);
        return `<td class="pn-coltot ${t>PN_DAILY_CAP?'over':''}" data-day="${d}">${t||''}</td>`;}).join('')}<td class="h-total-h" id="pn_grand">${grand}</td></tr></tfoot>
    </table></div>`;
  }

  document.getElementById('pnModal').innerHTML=`
    <button class="x" onclick="closePN()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
    <h2>PN Scheduling</h2>
    <p class="exp-sub">Auto-scheduled by priority (urgent 3–4, high 2–3, normal 1–2 across the range), capped at ${PN_DAILY_CAP} PNs per day. Adjust any cell — the day counter turns red if it goes over ${PN_DAILY_CAP}. Working scratchpad; export when done.</p>
    <div class="h-controls">
      <div class="h-range">
        <label>From <input type="date" value="${pnState.from}" onchange="pnSetRange('from',this.value)"></label>
        <label>To <input type="date" value="${pnState.to}" onchange="pnSetRange('to',this.value)"></label>
      </div>
      <div class="pn-gen">
        <button class="btn exp-mini" onclick="pnRegenerate()">↻ Auto-generate</button>
        <button class="btn exp-mini" onclick="pnClearAll()">Clear all</button>
      </div>
    </div>
    <div class="h-filters">
      <div class="h-fgroup"><span class="h-flabel">Priority</span>${priChips}</div>
      <div class="h-fgroup"><span class="h-flabel">Status</span>${statChips}</div>
      <div class="h-fgroup"><span class="h-flabel">Category</span>${catChips}</div>
    </div>
    <div class="pn-legend"><span class="pn-lg good">On target</span><span class="pn-lg under">Below target</span><span class="pn-lg over">Over target / cap</span></div>
    ${table}
    <div class="modal-actions">
      <button class="btn" onclick="closePN()">Close</button>
      <button class="btn primary" onclick="exportPNSchedule()" ${(!days.length||!list.length)?'disabled':''}>Export schedule</button>
    </div>`;
}

function exportPNSchedule(){
  const days=dayList(pnState.from,pnState.to);
  const list=pnFilteredList();
  if(!days.length||!list.length)return;
  const header=['Campaign','Priority','Status','Target',...days.map(d=>fmtDay(d)+' '+new Date(d).toLocaleDateString('en-GB',{month:'short'})),'Total PNs'];
  const rows=[header];
  list.forEach(c=>{
    let tot=0;
    const band=PN_FREQ[c.priority]||[0,0];
    const marks=days.map(d=>{const on=pnState.ticks.has(pnKey(c.id,d));if(on)tot++;return on?'PN':'';});
    rows.push([c.name,PRI_LABEL[c.priority]||'',STATUS_LABEL[computeStatus(c)],band[0]+'-'+band[1],...marks,tot]);
  });
  const colTotals=days.map(d=>pnDayTotal(d,list));
  const grand=colTotals.reduce((a,b)=>a+b,0);
  rows.push(['PNs per day','','','',...colTotals,grand]);
  const ws=XLSX.utils.aoa_to_sheet(rows);
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'PN Schedule');
  XLSX.writeFile(wb,'pn-schedule.xlsx');
}

/* ---------- To-Do List (tasks) ---------- */
// Tasks live in their own Supabase table ('tasks'), mirroring how campaigns work,
// with a localStorage cache as fallback. Each task: {id, text, campaignId, kam, added(ISO), done}.
const TASKS_KEY='cc_tasks_cache';
function loadTaskCache(){try{return JSON.parse(localStorage.getItem(TASKS_KEY))||[];}catch(e){return [];}}
function writeTaskCache(){try{localStorage.setItem(TASKS_KEY,JSON.stringify(tasks));}catch(e){}}
let tasks=loadTaskCache();
let tasksLoaded=false;

async function loadTasksFromDB(){
  if(!sb){tasksLoaded=true;return;}
  try{
    const {data,error}=await sb.from('tasks').select('id,data,updated_at').order('updated_at',{ascending:false});
    if(error)throw error;
    tasks=(data||[]).map(r=>({...r.data,id:r.id}));
    writeTaskCache();
  }catch(e){console.error('tasks load',e);}   // fall back to cache silently
  tasksLoaded=true;
}
async function upsertTask(t){
  const i=tasks.findIndex(x=>x.id===t.id);
  if(i>=0)tasks[i]=t;else tasks.unshift(t);
  writeTaskCache(); renderTasks();
  if(!sb)return;
  try{ const {id,...rest}=t; const {error}=await sb.from('tasks').upsert({id:t.id,data:rest}); if(error)throw error; }
  catch(e){console.error('task save',e); alert('Could not save the task to the database.');}
}
async function deleteTask(tid){
  tasks=tasks.filter(x=>x.id!==tid);
  writeTaskCache(); renderTasks();
  if(!sb)return;
  try{ const {error}=await sb.from('tasks').delete().eq('id',tid); if(error)throw error; }
  catch(e){console.error('task delete',e);}
}

function daysElapsed(iso){
  if(!iso)return 0;
  const then=new Date(iso); then.setHours(0,0,0,0);
  const now=new Date(); now.setHours(0,0,0,0);
  return Math.max(0, Math.round((now-then)/864e5));
}
function elapsedLabel(iso){
  const d=daysElapsed(iso);
  return d===0?'Today':d===1?'1 day':d+' days';
}

async function openTasks(){
  if(!tasksLoaded){ await loadTasksFromDB(); }
  renderTasks();
  document.getElementById('tasksOverlay').classList.add('open');
}
function closeTasks(){document.getElementById('tasksOverlay').classList.remove('open');}

function campaignName(cid){ const c=state.find(x=>x.id===cid); return c?c.name:''; }

function renderTasks(){
  const modal=document.getElementById('tasksModal');
  const campOpts=`<option value="">— campaign —</option>`+
    [...state].sort((a,b)=>a.name.localeCompare(b.name)).map(c=>`<option value="${c.id}">${esc(c.name)}</option>`).join('');
  const kamOpts=`<option value="">— KAM —</option>`+MANAGERS.map(m=>`<option value="${esc(m)}">${esc(m)}</option>`).join('');
  const open=tasks.filter(t=>!t.done);
  const done=tasks.filter(t=>t.done);
  const rowHTML=t=>{
    const cName=campaignName(t.campaignId);
    return `<tr class="tk-row ${t.done?'done':''}" data-id="${t.id}">
      <td class="tk-check"><button class="tk-box ${t.done?'on':''}" onclick="toggleTask('${t.id}')" title="${t.done?'Mark as not done':'Mark done'}">${t.done?'<svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"3\"><path d=\"M20 6 9 17l-5-5\"/></svg>':''}</button></td>
      <td class="tk-text">${esc(t.text)}</td>
      <td>${cName?`<span class="tk-tag tk-camp">${esc(cName)}</span>`:'<span class="tk-none">—</span>'}</td>
      <td>${t.kam?`<span class="tk-tag tk-kam">${esc(t.kam)}</span>`:'<span class="tk-none">—</span>'}</td>
      <td class="tk-date">${t.added?fmtDate(t.added):'—'}</td>
      <td class="tk-elapsed"><span class="tk-days ${daysElapsed(t.added)>=14&&!t.done?'old':''}">${elapsedLabel(t.added)}</span></td>
      <td class="tk-del-cell"><button class="tk-del" onclick="removeTask('${t.id}')" title="Delete task">✕</button></td>
    </tr>`;
  };
  const tableFor=(list,emptyMsg)=> list.length
    ? `<div class="tk-tablewrap"><table class="tk-table">
        <thead><tr><th></th><th>Task</th><th>Campaign</th><th>KAM</th><th>Date added</th><th>Elapsed</th><th></th></tr></thead>
        <tbody>${list.map(rowHTML).join('')}</tbody></table></div>`
    : `<div class="tk-empty">${emptyMsg}</div>`;

  modal.innerHTML=`
    <button class="x" onclick="closeTasks()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
    <h2>To-Do List</h2>
    <p class="exp-sub">Add tasks, tag them to a campaign and a KAM, and track how long they've been open.</p>
    <div class="tk-add">
      <input id="tk_text" class="tk-in" placeholder="What needs doing?" onkeydown="if(event.key==='Enter')addTask()">
      <select id="tk_camp" class="tk-in">${campOpts}</select>
      <select id="tk_kam" class="tk-in">${kamOpts}</select>
      <button class="btn primary" onclick="addTask()">Add task</button>
    </div>
    ${tableFor(open,'No open tasks. Add one above.')}
    ${done.length?`<div class="tk-done-h">Completed (${done.length})</div>${tableFor(done,'')}`:''}
    <div class="modal-actions"><button class="btn" onclick="closeTasks()">Close</button></div>`;
}

function addTask(){
  const text=(document.getElementById('tk_text').value||'').trim();
  if(!text){document.getElementById('tk_text').focus();return;}
  const t={
    id:id(), text,
    campaignId:document.getElementById('tk_camp').value||'',
    kam:document.getElementById('tk_kam').value||'',
    added:isoOf(new Date()), done:false
  };
  upsertTask(t);
}
function toggleTask(tid){ const t=tasks.find(x=>x.id===tid); if(t){ t.done=!t.done; upsertTask(t); } }
function removeTask(tid){ if(confirm('Delete this task?')) deleteTask(tid); }

document.getElementById('addBtn').onclick=()=>openForm(null);
// ---- Multi-select dropdown filters ----
// A dropdown shows a label + summary of the current selection, and opens a checkbox
// panel. Empty set = "All". Each config: {id, label, filterSet, items:[[val,text]...]}.
const FILTER_DEFS=[
  {id:'dd_status', label:'Status', set:()=>statusFilter, items:()=>[['progress','In Progress'],['notstarted','Not Started'],['completed','Completed']]},
  {id:'dd_kam', label:'KAM', set:()=>kamFilter, items:()=>[...MANAGERS.map(m=>[m,m]),['__none__','Unassigned']]},
  {id:'dd_life', label:'Lifecycle', set:()=>lifeFilter, items:()=>LIFECYCLE.map(l=>[l,l])}
];
function filterSummary(def){
  const set=def.set(), items=def.items();
  if(set.size===0) return 'All';
  if(set.size===1){ const v=[...set][0]; const found=items.find(i=>i[0]===v); return found?found[1]:'1 selected'; }
  return set.size+' selected';
}
function renderFilterDropdown(def){
  const box=document.getElementById(def.id);
  const set=def.set(), items=def.items();
  const active=set.size>0;
  const opts=items.map(([val,text])=>`
    <label class="msdd-opt"><input type="checkbox" ${set.has(val)?'checked':''} data-val="${esc(String(val))}"><span>${esc(text)}</span></label>`).join('');
  box.innerHTML=`
    <button class="msdd-btn ${active?'has':''}" type="button">
      <span class="msdd-lbl">${def.label}</span>
      <span class="msdd-val">${esc(filterSummary(def))}</span>
      <svg class="msdd-caret" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M6 9l6 6 6-6"/></svg>
    </button>
    <div class="msdd-panel">
      <div class="msdd-head"><span>${def.label}</span><button type="button" class="msdd-clear" ${active?'':'disabled'}>Clear</button></div>
      ${opts}
    </div>`;
  const btn=box.querySelector('.msdd-btn');
  const panel=box.querySelector('.msdd-panel');
  btn.onclick=e=>{ e.stopPropagation(); const open=box.classList.contains('open'); closeAllDropdowns(); if(!open)box.classList.add('open'); };
  panel.onclick=e=>e.stopPropagation();
  box.querySelectorAll('.msdd-opt input').forEach(inp=>inp.onchange=()=>{
    const v=inp.dataset.val;
    inp.checked?set.add(v):set.delete(v);
    renderFilterDropdown(def);      // refresh summary + clear-button state
    document.getElementById(def.id).classList.add('open'); // keep panel open for more picks
    renderGrid();
  });
  box.querySelector('.msdd-clear').onclick=e=>{ e.stopPropagation(); set.clear(); renderFilterDropdown(def); document.getElementById(def.id).classList.add('open'); renderGrid(); };
}
function closeAllDropdowns(){ document.querySelectorAll('.msdd.open').forEach(d=>d.classList.remove('open')); }
document.addEventListener('click',()=>closeAllDropdowns());
function initFilters(){ FILTER_DEFS.forEach(renderFilterDropdown); }
initFilters();
document.getElementById('search').oninput=renderGrid;
document.getElementById('sortBy').onchange=renderGrid;
['detailOverlay','formOverlay','soonOverlay','exportOverlay','heroOverlay','pnOverlay','batchOverlay','monthsOverlay','tasksOverlay'].forEach(oid=>{document.getElementById(oid).addEventListener('click',e=>{if(e.target.id===oid)e.target.classList.remove('open')})});
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeDetail();closeForm();closeSoon();closeExport();closeHero();closePN();closeBatch();closeMonths();closeTasks();document.body.classList.remove('sb-open')}});

// Paint from cache immediately, then connect to Supabase and load the live data.
renderGrid();
if(initSupabase()){
  loadFromDB();
}else{
  setSyncBadge('config','Set Supabase keys in the file');
}
</script>
