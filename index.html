    --pri-urgent:#dd4b4b; --pri-urgent-bg:#fdeaea;
    --pri-high:#c47a12; --pri-high-bg:#fdf0da;
    --pri-normal:#2f7fd6; --pri-normal-bg:#e6f1fd;
    --pri-low:#7a7a88; --pri-low-bg:#f1f1f5;
    --grad-hero:linear-gradient(120deg,#c9d4ff 0%,#e7d4ff 28%,#ffd9e6 55%,#ffe4cf 78%,#d4f3e2 100%);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
    background:var(--bg);color:var(--text);line-height:1.5;-webkit-font-smoothing:antialiased;
    padding:24px 24px 80px;position:relative;min-height:100vh}
  /* ambient pastel wash — the airy backdrop from the inspiration */
  body::before{content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;
    background:
      radial-gradient(680px 420px at 8% -4%, rgba(150,170,255,.16), transparent 60%),
      radial-gradient(720px 460px at 98% 2%, rgba(255,190,225,.15), transparent 60%),
      radial-gradient(760px 520px at 60% 108%, rgba(190,240,215,.14), transparent 62%);}

  /* ---- Collapsible sidebar ---- */
  :root{--sb-w:236px;--sb-w-collapsed:64px}
  .sidebar{position:fixed;top:0;left:0;bottom:0;width:var(--sb-w);z-index:60;
    background:radial-gradient(120% 60% at 0% 0%, rgba(150,170,255,.12), transparent 60%),var(--surface);
    border-right:1px solid var(--border);box-shadow:var(--shadow-sm);
    display:flex;flex-direction:column;padding:16px 12px;transition:width .22s ease}
  body.sb-collapsed .sidebar{width:var(--sb-w-collapsed)}
  .sb-toggle{position:absolute;top:18px;right:-13px;width:26px;height:26px;border-radius:50%;
    border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;
    display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-sm);transition:.16s;z-index:2}
  .sb-toggle:hover{color:var(--text);box-shadow:var(--shadow-md)}
  .sb-toggle svg{transition:transform .22s}
  body.sb-collapsed .sb-toggle svg{transform:rotate(180deg)}
  .sb-brand{display:flex;align-items:center;gap:10px;padding:6px 10px 18px;overflow:hidden;white-space:nowrap}
  .sb-logo{font-size:18px;flex-shrink:0;background:linear-gradient(120deg,#6a5cf0,#c07af0);
    -webkit-background-clip:text;background-clip:text;color:transparent}
  .sb-brand-txt{font-size:15px;font-weight:650;letter-spacing:-.01em;transition:opacity .16s}
  .sb-nav{display:flex;flex-direction:column;gap:4px}
  .sb-item{display:flex;align-items:center;gap:12px;width:100%;padding:11px 12px;border:none;
    background:none;color:var(--muted);font:inherit;font-size:13.5px;font-weight:500;cursor:pointer;
    border-radius:11px;text-align:left;transition:.14s;white-space:nowrap;overflow:hidden}
  .sb-item svg{flex-shrink:0}
  .sb-item:hover{background:var(--c-mfc-bg);color:var(--c-mfc)}
  .sb-item.active{background:var(--c-mfc-bg);color:var(--c-mfc);font-weight:600}
  .sb-label{transition:opacity .16s}
  body.sb-collapsed .sb-brand-txt,body.sb-collapsed .sb-label{opacity:0;pointer-events:none}
  .sb-scrim{display:none}

  /* content offset for the fixed sidebar */
  .wrap{margin-left:var(--sb-w);transition:margin-left .22s ease}
  body.sb-collapsed .wrap{margin-left:var(--sb-w-collapsed)}

  @media (max-width:760px){
    /* sidebar becomes an overlay drawer on small screens */
    .wrap{margin-left:0}
    body.sb-collapsed .wrap{margin-left:0}
    .sidebar{transform:translateX(-100%);transition:transform .22s ease;width:var(--sb-w)}
    body.sb-open .sidebar{transform:none}
    body.sb-collapsed .sidebar{width:var(--sb-w)} /* ignore collapse on mobile */
    body.sb-collapsed .sb-brand-txt,body.sb-collapsed .sb-label{opacity:1}
    .sb-toggle{right:14px} /* becomes a close affordance inside the drawer */
    body.sb-open .sb-scrim{display:block;position:fixed;inset:0;background:rgba(30,30,50,.32);z-index:55}
    .sb-fab{display:flex}
  }
  /* floating open button (mobile only) */
  .sb-fab{display:none;position:fixed;top:20px;left:16px;z-index:50;width:40px;height:40px;border-radius:12px;
    border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;
    align-items:center;justify-content:center;box-shadow:var(--shadow-md)}
  .wrap{max-width:1300px;margin:0 auto}
  header.top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:22px}
  h1{font-size:23px;font-weight:650;letter-spacing:-.02em}
  .sub{color:var(--muted);font-size:12.5px;margin-top:3px}
  .btn{font:inherit;font-size:13px;border:1px solid var(--border-strong);background:var(--surface);
    color:var(--text);border-radius:999px;padding:9px 16px;cursor:pointer;
    display:inline-flex;align-items:center;gap:6px;transition:.16s;box-shadow:var(--shadow-sm)}
  .btn:hover{border-color:transparent;box-shadow:var(--shadow-md);transform:translateY(-1px)}
  .btn:active{transform:scale(.98)}
  .btn.primary{background:linear-gradient(120deg,#6a5cf0,#8b6cf0 55%,#c07af0);color:#fff;border-color:transparent;
    box-shadow:0 4px 14px rgba(122,92,240,.32)}
  .btn.primary:hover{box-shadow:0 6px 20px rgba(122,92,240,.42);transform:translateY(-1px)}

  .controls{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:15px}
  .search{flex:1;min-width:200px;position:relative}
  .search input{width:100%;font:inherit;font-size:13px;padding:11px 14px 11px 38px;border:1px solid var(--border);
    border-radius:999px;background:var(--surface);color:var(--text);box-shadow:var(--shadow-sm);transition:.16s}
  .search input:focus{outline:none;border-color:var(--c-mfc);box-shadow:0 0 0 4px rgba(106,92,240,.10)}
  .search svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);opacity:.45}
  select{font:inherit;font-size:13px;padding:10px 14px;border:1px solid var(--border);
    border-radius:999px;background:var(--surface);color:var(--text);cursor:pointer;box-shadow:var(--shadow-sm)}
  select:focus{outline:none;border-color:var(--c-mfc)}

  .filters{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:18px}
  .filters .flabel{font-size:11.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;font-weight:600;margin-right:2px}
  .live-dash{display:grid;grid-template-columns:repeat(7,1fr);gap:12px;margin-bottom:28px}
  @media (max-width:980px){.live-dash{grid-template-columns:repeat(4,1fr)}}
  @media (max-width:620px){.live-dash{grid-template-columns:repeat(2,1fr)}}
  .ld-card{position:relative;background:var(--surface);border:1px solid var(--border);
    border-radius:var(--radius-sm);padding:16px 15px 14px;cursor:pointer;transition:.18s;min-width:0;
    overflow:hidden;box-shadow:var(--shadow-sm)}
  /* soft pastel gradient wash tinted per category */
  .ld-card::before{content:"";position:absolute;inset:0;z-index:0;opacity:.5;transition:opacity .18s;
    background:radial-gradient(120% 130% at 15% 0%, var(--ld-bg,#eef) 0%, transparent 70%);}
  .ld-card>*{position:relative;z-index:1}
  .ld-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md)}
  .ld-card:hover::before{opacity:.85}
  .ld-card.on{border-color:var(--ld-c,var(--c-mfc));box-shadow:0 0 0 3px color-mix(in srgb,var(--ld-c,#6a5cf0) 16%,transparent),var(--shadow-sm)}
  .ld-card.on::before{opacity:1}
  .ld-num{font-size:27px;font-weight:680;line-height:1;letter-spacing:-.02em;color:var(--ld-c,var(--text))}
  .ld-lbl{font-size:11px;color:var(--muted);margin-top:7px;font-weight:550;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ld-total{--ld-c:#4a4a58;--ld-bg:#ececf6}
  .ld-total .ld-num{color:var(--text)}
  .chip{font:inherit;font-size:12px;padding:7px 15px;border-radius:999px;border:1px solid var(--border-strong);
    background:var(--surface);color:var(--muted);cursor:pointer;transition:.16s;box-shadow:var(--shadow-sm)}
  .chip:hover{border-color:var(--text);color:var(--text);transform:translateY(-1px)}
  .chip.active{background:linear-gradient(120deg,#16161d,#37374a);color:#fff;border-color:transparent;box-shadow:var(--shadow-md)}

  .cat-section{margin-bottom:28px}
  .cat-header{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding-bottom:0;border-bottom:none}
  .cat-dot{width:11px;height:11px;border-radius:4px;flex-shrink:0;
    background:linear-gradient(135deg,var(--cd,var(--border-strong)),color-mix(in srgb,var(--cd,#888) 55%,#fff))}
  .cat-header h2{font-size:15px;font-weight:640;letter-spacing:-.015em}
  .cat-count{font-size:11.5px;color:var(--muted);background:var(--surface);padding:3px 10px;border-radius:999px;
    box-shadow:var(--shadow-sm);font-weight:550}
  .cat-expand{margin-left:auto;font:inherit;font-size:12px;font-weight:550;color:var(--muted);
    background:var(--surface);border:1px solid var(--border);cursor:pointer;display:inline-flex;align-items:center;gap:4px;
    padding:5px 12px;border-radius:999px;transition:.16s;box-shadow:var(--shadow-sm)}
  .cat-expand:hover{color:var(--text);transform:translateY(-1px);box-shadow:var(--shadow-md)}
  .cat-expand svg{transition:transform .18s}
  .cat-expand.open svg{transform:rotate(180deg)}
  .cat-collapsed .grid{grid-template-rows:0;max-height:none}

  .star{background:none;border:none;cursor:pointer;padding:3px;border-radius:8px;display:flex;
    color:var(--hint);transition:.14s;line-height:0}
  .star:hover{background:var(--warn-bg);color:var(--warn)}
  .star.on{color:#f0b429}
  .fav-section{margin-bottom:28px;background:
    radial-gradient(140% 160% at 0% 0%, rgba(255,225,150,.28), transparent 55%),var(--surface);
    border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px 18px;box-shadow:var(--shadow-sm)}
  .fav-header{display:flex;align-items:center;gap:8px;margin-bottom:13px}
  .fav-header svg{color:#f0b429}
  .fav-header h2{font-size:15px;font-weight:640;letter-spacing:-.015em}
  .fav-header .cat-count{background:var(--surface)}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(216px,1fr));gap:13px}
  .card{position:relative;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);
    padding:15px 15px 14px;cursor:pointer;transition:.18s;overflow:hidden;box-shadow:var(--shadow-sm)}
  /* faint category-tinted gradient in the corner */
  .card::before{content:"";position:absolute;inset:0;z-index:0;opacity:0;transition:opacity .2s;
    background:radial-gradient(90% 80% at 100% 0%, var(--catbg,transparent) 0%, transparent 60%)}
  .card>*{position:relative;z-index:1}
  .card::after{content:"";position:absolute;left:0;top:14px;bottom:14px;width:3px;border-radius:0 3px 3px 0;
    background:linear-gradient(var(--cat,var(--border-strong)),color-mix(in srgb,var(--cat,#888) 45%,#fff))}
  .card:hover{transform:translateY(-3px);box-shadow:var(--shadow-lift);border-color:transparent}
  .card:hover::before{opacity:.7}
  .card .chead{display:flex;justify-content:space-between;align-items:center;gap:6px;margin-bottom:9px}
  .badges{display:flex;gap:6px;flex-wrap:wrap}
  .status{font-size:10px;font-weight:650;padding:3px 9px;border-radius:999px;white-space:nowrap}
  .s-progress{background:var(--live-bg);color:var(--live)}
  .s-notstarted{background:var(--warn-bg);color:var(--warn)}
  .s-completed{background:var(--done-bg);color:var(--done)}
  .pri{font-size:10px;font-weight:650;padding:3px 9px;border-radius:999px;white-space:nowrap}
  .pri-urgent{background:var(--pri-urgent-bg);color:var(--pri-urgent)}
  .pri-high{background:var(--pri-high-bg);color:var(--pri-high)}
  .pri-normal{background:var(--pri-normal-bg);color:var(--pri-normal)}
  .pri-low{background:var(--pri-low-bg);color:var(--pri-low)}
  .card h3{font-size:14px;font-weight:640;letter-spacing:-.015em;line-height:1.28;margin-bottom:3px;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .wallet{font-size:11px;color:var(--hint);margin-bottom:9px;font-family:ui-monospace,monospace}
  .dates{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);margin-bottom:11px}
  .dates svg{flex-shrink:0;opacity:.6}
  .kpis{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-top:2px}
  .kpi{background:var(--bg);border-radius:9px;padding:7px 4px;text-align:center;border:1px solid var(--border)}
  .kpi .kl{font-size:9.5px;color:var(--muted);font-weight:650;letter-spacing:.03em}
  .kpi .kv{font-size:11.5px;font-weight:640;margin-top:2px}
  .kpi .kv small{font-size:9px;color:var(--hint);font-weight:400}
  .star{padding:2px}
  .star svg{width:16px;height:16px}

  .empty{text-align:center;padding:60px 20px;color:var(--muted)}
  .empty svg{opacity:.35;margin-bottom:12px}

  .overlay{position:fixed;inset:0;background:rgba(30,30,50,.32);backdrop-filter:blur(3px);display:none;align-items:flex-start;
    justify-content:center;padding:40px 20px;overflow-y:auto;z-index:50}
  .overlay.open{display:flex}
  .modal{background:var(--surface);border-radius:22px;max-width:600px;width:100%;
    padding:28px 30px 30px;border:1px solid var(--border);position:relative;animation:pop .18s ease;box-shadow:var(--shadow-lift)}
  @keyframes pop{from{transform:translateY(10px) scale(.99);opacity:0}to{transform:none;opacity:1}}
  .modal .x{position:absolute;top:18px;right:18px;background:var(--bg);border:none;cursor:pointer;
    color:var(--muted);padding:7px;border-radius:10px;display:flex;transition:.14s}
  .modal .x:hover{background:var(--pri-urgent-bg);color:var(--danger)}
  .modal .mtags{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
  .cat-tag{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;
    padding:3px 9px;border-radius:5px;background:var(--catbg);color:var(--cat);white-space:nowrap}
  .modal h2{font-size:21px;font-weight:600;letter-spacing:-.01em;margin-bottom:3px;padding-right:30px}
  .modal .mwallet{color:var(--muted);font-size:13px;margin-bottom:18px;font-family:ui-monospace,monospace}
  .sec{margin-bottom:20px}
  .sec-t{font-size:11.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;font-weight:600;margin-bottom:9px}
  .dl{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);
    border:.5px solid var(--border);border-radius:var(--radius-sm);overflow:hidden}
  .dl .cell{background:var(--surface);padding:11px 13px}
  .dl .dt{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px}
  .dl .dd{font-size:14px;font-weight:500}
  .kpi-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
  .kpi-box{background:var(--bg);border-radius:var(--radius-sm);padding:11px 12px;text-align:center}
  .kpi-box .kl{font-size:12px;color:var(--muted);font-weight:600}
  .kpi-box .kv{font-size:18px;font-weight:600;margin-top:3px}
  .kpi-box .ka{font-size:11px;color:var(--hint);margin-top:2px}
  /* lifecycle */
  .life{display:flex;flex-wrap:wrap;gap:0}
  .life-step{display:flex;align-items:center;font-size:12px}
  .life-step .dot{width:9px;height:9px;border-radius:50%;background:var(--border-strong);margin-right:6px}
  .life-step.done .dot{background:var(--c-jfc)}
  .life-step.done{color:var(--text);font-weight:500}
  .life-step:not(.done){color:var(--hint)}
  .life-step .sep{width:18px;height:.5px;background:var(--border);margin:0 8px}
  /* editions — detail view */
  .editions{display:flex;flex-direction:column;gap:12px}
  .ed-block{border:1px solid var(--border);border-radius:14px;overflow:hidden;box-shadow:var(--shadow-sm)}
  .ed-head{display:flex;align-items:center;gap:10px;padding:11px 14px;
    background:radial-gradient(120% 180% at 0% 0%, var(--c-mfc-bg) 0%, transparent 65%),var(--surface);
    border-bottom:1px solid var(--border)}
  .ed-badge{font-size:11px;font-weight:650;letter-spacing:.02em;padding:3px 10px;border-radius:999px;
    background:var(--c-mfc);color:#fff;white-space:nowrap}
  .ed-range{font-size:12.5px;color:var(--muted);font-weight:550}
  .ed-assets{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border)}
  .ed-asset{display:flex;justify-content:space-between;align-items:center;gap:8px;background:var(--surface);padding:9px 14px;font-size:13px}
  .ed-asset-name{color:var(--text);font-weight:500}
  .ed-asset-date{color:var(--c-jfc);font-weight:600;font-size:12.5px}
  .ed-asset.off .ed-asset-name{color:var(--hint);font-weight:400}
  .ed-asset.off .ed-asset-date{color:var(--hint)}
  @media (max-width:560px){.ed-assets{grid-template-columns:1fr}}
  .modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:22px}
  .modal-actions .btn.danger{color:var(--danger);border-color:var(--danger)}
  .soon-modal{max-width:440px;text-align:left}
  .soon-badge{display:inline-block;font-size:11px;font-weight:650;letter-spacing:.03em;text-transform:uppercase;
    padding:5px 12px;border-radius:999px;color:#fff;margin-bottom:14px;
    background:linear-gradient(120deg,#6a5cf0,#8b6cf0 55%,#c07af0)}
  .soon-modal h2{font-size:20px;font-weight:650;letter-spacing:-.02em;margin-bottom:8px;padding-right:30px}
  .soon-desc{font-size:14px;color:var(--muted);line-height:1.6}

  .field{margin-bottom:14px}
  .field label{display:block;font-size:12.5px;color:var(--muted);margin-bottom:5px;font-weight:500}
  .field input,.field textarea,.field select{width:100%;font:inherit;font-size:14px;padding:11px 13px;
    border:1px solid var(--border);border-radius:12px;background:var(--surface);color:var(--text);transition:.14s}
  .field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:var(--c-mfc);
    box-shadow:0 0 0 4px rgba(106,92,240,.10)}
  .field textarea{resize:vertical;min-height:54px}
  .field input.ai-filled,.field textarea.ai-filled,.field select.ai-filled{border-color:var(--c-jfc);background:var(--c-jfc-bg)}
  .ai-zone{border:1.5px dashed var(--border-strong);border-radius:var(--radius);padding:4px;margin-bottom:20px;background:var(--bg)}
  .ai-zone.busy{opacity:.85;pointer-events:none}
  .ai-zone-inner{display:flex;align-items:center;gap:13px;padding:14px 15px;border-radius:var(--radius-sm);transition:background .15s}
  .ai-zone-inner.drag{background:var(--c-jfc-bg)}
  .ai-zone-inner > svg{color:var(--c-jfc);flex-shrink:0}
  .ai-zone-txt{display:flex;flex-direction:column;gap:2px;flex:1;min-width:0}
  .ai-zone-txt strong{font-size:13.5px;font-weight:600}
  .ai-zone-txt span{font-size:12px;color:var(--muted);line-height:1.45}
  .ai-zone .btn{flex-shrink:0}
  .ai-status{font-size:12.5px;padding:0 15px;min-height:0;color:var(--muted);line-height:1.5}
  .ai-status:not(:empty){padding:2px 15px 12px}
  .ai-status.ok{color:var(--ok)}
  .ai-status.err{color:var(--danger)}
  .ai-spin{display:inline-block;width:11px;height:11px;border:2px solid var(--border-strong);border-top-color:var(--c-jfc);border-radius:50%;animation:aispin .7s linear infinite;vertical-align:-1px;margin-right:3px}
  @keyframes aispin{to{transform:rotate(360deg)}}
  .frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .frow3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
  @media (max-width:560px){.frow,.frow3{grid-template-columns:1fr}.dl,.kpi-grid,.kpi-box{grid-template-columns:1fr}}
  .form-sec-t{font-size:11.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;font-weight:600;
    margin:20px 0 11px;padding-top:16px;border-top:.5px solid var(--border)}
  /* editions — form editor */
  .ed-edit-block{border:1px solid var(--border);border-radius:14px;padding:12px 14px 6px;margin-bottom:12px;
    background:radial-gradient(140% 200% at 0% 0%, var(--c-mfc-bg) 0%, transparent 60%),var(--surface)}
  .ed-edit-head{display:flex;align-items:center;gap:10px;margin-bottom:12px}
  .ed-edit-row{display:grid;grid-template-columns:1fr 160px;gap:10px;align-items:center;margin-bottom:10px}
  .ed-edit-row label{font-size:13px;color:var(--text);font-weight:500;margin:0}
  .ed-edit-row input{font:inherit;font-size:13px;padding:8px 10px;border:1px solid var(--border);
    border-radius:9px;background:var(--surface);color:var(--text);width:100%;transition:.14s}
  .ed-edit-row input:focus{outline:none;border-color:var(--c-mfc);box-shadow:0 0 0 3px rgba(106,92,240,.10)}
  @media (max-width:460px){.ed-edit-row{grid-template-columns:1fr}}

   Simple client-side gate so the URL isn't wide open. Change the password by
   replacing GATE_HASH below with the SHA-256 of your chosen password.
   (This deters casual access; it is not strong security. For that, use Vercel's
   built-in Password Protection on top, or the M365-hosted-data route.) */
const GATE_HASH="f9c01687b613352f510e7964e672b3612738bb46eab514dd77f6ef0160a33954"; // "bkash-campaigns-2026"
const GATE_SESSION_KEY="cc_gate_ok";
async function sha256hex(s){const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));return [...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join('');}
function unlockApp(){document.body.classList.remove('locked');const g=document.getElementById('gate');if(g)g.style.display='none';}
async function tryUnlock(pw){
  const h=await sha256hex(pw);
  if(h===GATE_HASH){sessionStorage.setItem(GATE_SESSION_KEY,'1');unlockApp();return true;}
  return false;
}
(function initGate(){
  if(sessionStorage.getItem(GATE_SESSION_KEY)==='1'){unlockApp();return;}
  const btn=document.getElementById('gateBtn'),inp=document.getElementById('gatePass'),err=document.getElementById('gateErr');
  async function attempt(){
    err.textContent='';
    if(!(await tryUnlock(inp.value))){err.textContent='Incorrect password.';inp.value='';inp.focus();}
  }
  if(btn)btn.onclick=attempt;
  if(inp)inp.addEventListener('keydown',e=>{if(e.key==='Enter')attempt();});
  if(inp)inp.focus();
})();

// ---- Editions ----
// A campaign's run can be divided into N editions. Ranges are an equal split of
// the day-span, with the final edition absorbing any remainder days.
const EDITION_OPTIONS=[1,2,3,4,5,6,8,10,12];
function addDaysISO(iso,days){const d=new Date(iso);d.setDate(d.getDate()+days);return d.toISOString().slice(0,10);}
function computeEditionRanges(start,end,n){
  n=Math.max(1,Number(n)||1);
  if(!start||!end)return Array.from({length:n},(_,i)=>({idx:i+1,start:"",end:""}));
  const total=daysBetween(start,end)+1;        // inclusive day count
  if(total<=0)return Array.from({length:n},(_,i)=>({idx:i+1,start:"",end:""}));
  const base=Math.floor(total/n);
  const ranges=[];let cursor=0;
  for(let i=0;i<n;i++){
    const len=(i===n-1)?(total-cursor):base;    // last edition absorbs remainder
    const s=addDaysISO(start,cursor);
    const e=addDaysISO(start,cursor+len-1);
    ranges.push({idx:i+1,start:s,end:e,days:len});
    cursor+=len;
  }
  return ranges;
}

const KEY = "content_campaigns_v3";

/* ---------- Shared data via auto-loaded companion file (OneDrive) ----------
   Reads campaigns from campaigns_data.js which sets window.CAMPAIGNS_DATA.
   Browsers block fetch() of a local sibling file, but DO allow loading it as a
   <script>, so everyone who opens the HTML from the shared OneDrive folder sees

function setSyncBadge(stateStr,detail){

/* ---------- Supabase-backed storage ----------
   Config is set in the SUPABASE block near the top of this file (URL + anon key).
   The database is the source of truth. localStorage is only an offline cache so
   the UI can show something instantly and survive a dropped connection. */
let sb=null;
function initSupabase(){
  try{
    if(window.SUPABASE_URL && window.SUPABASE_ANON_KEY && window.supabase){
      sb=window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
      return true;
    }
  }catch(e){console.error(e);}
  return false;
}

function id(){return Math.random().toString(36).slice(2,9)}

// Local cache only (instant paint / offline fallback).
function loadCache(){try{const r=localStorage.getItem(KEY);if(r)return JSON.parse(r);}catch(e){}
  try{if(window.CAMPAIGNS_DATA&&Array.isArray(window.CAMPAIGNS_DATA.campaigns))return JSON.parse(JSON.stringify(window.CAMPAIGNS_DATA.campaigns));}catch(e){}
  try{return JSON.parse(JSON.stringify(SEED));}catch(e){return [];}
}
function writeCache(){try{localStorage.setItem(KEY,JSON.stringify(state));}catch(e){}}
let state = loadCache();

// Pull all campaigns from Supabase and refresh the view.
let didSeed=false;
async function loadFromDB(){
  if(!sb){setSyncBadge('config','Set Supabase keys');return;}
  setSyncBadge('syncing','Loading…');
  try{
    const {data,error}=await sb.from('campaigns').select('id,data,updated_at').order('updated_at',{ascending:false});
    if(error)throw error;
    // First-run auto-seed: if the shared database is empty, upload the built-in
    // 73 campaigns into it once, silently, so every user loads them. Runs only
    // when the table has zero rows, so it never re-adds deleted campaigns.
    if((!data||data.length===0)&&!didSeed){
      didSeed=true;
      const built=(window.CAMPAIGNS_DATA&&window.CAMPAIGNS_DATA.campaigns)||SEED||[];
      if(built.length){
        setSyncBadge('syncing','Setting up…');
        const rows=built.map(c=>{const {id,...rest}=c;return {id:c.id,data:rest};});
        const {error:seedErr}=await sb.from('campaigns').upsert(rows);
        if(!seedErr)return loadFromDB();
        console.error(seedErr);
      }
    }
    state=(data||[]).map(r=>({...r.data,id:r.id}));
    writeCache();
    renderGrid();
    setSyncBadge('loaded');
  }catch(e){console.error(e);setSyncBadge('error','Load failed — showing cached');renderGrid();}
}

// Write one campaign (insert or update) to the DB, then update local state.
async function upsertCampaign(c){
  const prev=JSON.parse(JSON.stringify(state));
  // optimistic local update
  const i=state.findIndex(x=>x.id===c.id);
  if(i>=0)state[i]=c;else state.unshift(c);
  writeCache();renderGrid();
  if(!sb){setSyncBadge('local');return;}
  setSyncBadge('syncing');
  try{
    const {id,...rest}=c;
    const {error}=await sb.from('campaigns').upsert({id:c.id,data:rest});
    if(error)throw error;
    setSyncBadge('loaded');
  }catch(e){console.error(e);state=prev;writeCache();renderGrid();setSyncBadge('error','Save failed');alert('Could not save to the database. Check your connection and try again.');}
}

// Delete one campaign from the DB, then update local state.
async function deleteCampaignDB(cid){
  const prev=JSON.parse(JSON.stringify(state));
  state=state.filter(x=>x.id!==cid);
  writeCache();renderGrid();
  if(!sb){setSyncBadge('local');return;}
  setSyncBadge('syncing');
  try{
    const {error}=await sb.from('campaigns').delete().eq('id',cid);
    if(error)throw error;
    setSyncBadge('loaded');
  }catch(e){console.error(e);state=prev;writeCache();renderGrid();setSyncBadge('error','Delete failed');}
}

// Bulk upsert (used by import and one-time migration).
async function bulkUpsert(list){
  if(!sb){alert('Supabase is not configured.');return false;}
  setSyncBadge('syncing','Saving…');
  try{
    const rows=list.map(c=>{const {id,...rest}=c;return {id:c.id,data:rest};});
    const {error}=await sb.from('campaigns').upsert(rows);
    if(error)throw error;
    await loadFromDB();
    return true;
  }catch(e){console.error(e);setSyncBadge('error');alert('Bulk save failed: '+(e.message||e));return false;}
}

function blankPlacements(editions){
  const n=Math.max(1,Number(editions)||1);
  const o={};
  // Each channel holds an array of date strings, one slot per edition (blank by default).
  PLACEMENTS.forEach(p=>o[p.key]={dates:Array.from({length:n},()=>"" )});
  return o;
}
// Normalize any campaign's placements to the current edition count, preserving
// existing dates. Handles old planned/actual data by discarding it cleanly.
function normalizePlacements(c){
  const n=Math.max(1,Number(c.editions)||1);
  const src=c.placements||{};
  const out={};
  PLACEMENTS.forEach(p=>{
    const prev=src[p.key]||{};
    const arr=Array.isArray(prev.dates)?prev.dates.slice(0,n):[];
    while(arr.length<n)arr.push("");
    out[p.key]={dates:arr};
  });
  return out;
}

function daysBetween(a,b){return Math.round((new Date(b)-new Date(a))/864e5)}
function fmtDate(d){if(!d)return"—";return new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}
function fmtNum(n){return Number(n||0).toLocaleString('en-GB')}
function pct(a,t){if(!t)return 0;return Math.round(a/t*100)}

function computeStatus(c){
  const today=new Date();today.setHours(0,0,0,0);
  if(!c.start||!c.end)return"notstarted";
  const s=new Date(c.start),e=new Date(c.end);
  if(today<s)return"notstarted";
  if(today>e)return"completed";
  return"progress";
}
const STATUS_LABEL={notstarted:"Not Started",progress:"In Progress",completed:"Completed"};
function daysLeft(c){const today=new Date();today.setHours(0,0,0,0);return daysBetween(today,c.end);}

let statusFilter=new Set(["progress"]);
const expandedCats=new Set();

function renderLiveDash(){
  // "Live" = campaigns currently in progress (started, not yet ended).
  const live=state.filter(c=>computeStatus(c)==="progress");
  const counts={}; CAT_ORDER.forEach(k=>counts[k]=0);
  live.forEach(c=>{ if(counts[c.category]!=null) counts[c.category]++; });
  const el=document.getElementById('liveDash');
  const showingLiveOnly = statusFilter.size===1 && statusFilter.has("progress");
  let html=`<div class="ld-card ld-total ${showingLiveOnly?'on':''}" data-cat="__live" title="Show all live campaigns">
      <div class="ld-num">${live.length}</div><div class="ld-lbl">Live total</div></div>`;
  CAT_ORDER.forEach(k=>{
    const cat=CATS[k];
    html+=`<div class="ld-card" data-cat="${k}" style="--ld-c:var(${cat.cat});--ld-bg:var(${cat.bg})" title="${cat.label} — live now">
      <div class="ld-num">${counts[k]}</div><div class="ld-lbl">${cat.short}</div></div>`;
  });
  el.innerHTML=html;
  el.querySelectorAll('.ld-card').forEach(card=>card.onclick=()=>{
    // Clicking a category card jumps to live campaigns filtered to that category.
    statusFilter=new Set(["progress"]);
    syncStatusChips();
    const cat=card.dataset.cat;
    const search=document.getElementById('search');
    if(cat==="__live"){ search.value=''; }
    renderGrid();
    if(cat!=="__live"){
      const sec=document.querySelector(`.cat-section[data-cat="${cat}"]`);
      if(sec) sec.scrollIntoView({behavior:'smooth',block:'start'});
    }
  });
}

function renderGrid(){
  renderLiveDash();
  const q=document.getElementById('search').value.toLowerCase().trim();
  const sort=document.getElementById('sortBy').value;
  let list=state.filter(c=>{
    if(statusFilter.size>0 && !statusFilter.has(computeStatus(c)))return false;
    if(q&&!(c.name.toLowerCase().includes(q)||(c.wallet||'').toLowerCase().includes(q)||(c.manager||'').toLowerCase().includes(q)))return false;
    return true;
  });
  list.sort((a,b)=>{
    if(sort==="endSoon")return new Date(a.end)-new Date(b.end);
    if(sort==="priority")return PRI_RANK[a.priority]-PRI_RANK[b.priority];
    if(sort==="recent")return new Date(b.start)-new Date(a.start);
    if(sort==="name")return a.name.localeCompare(b.name);
    return 0;
  });
  const wrap=document.getElementById('sections'),empty=document.getElementById('empty');
  if(!list.length){wrap.innerHTML='';empty.style.display='block';return}
  empty.style.display='none';
  let html="";
  const favs=list.filter(c=>c.starred);
  if(favs.length){
    html+=`<div class="fav-section"><div class="fav-header">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1.5"><path d="M12 2.5l2.9 5.9 6.5.95-4.7 4.58 1.1 6.47L12 17.9l-5.8 3.05 1.1-6.47L2.6 9.85l6.5-.95L12 2.5z"/></svg>
      <h2>Favorites</h2><span class="cat-count">${favs.length}</span></div>
      <div class="grid">${favs.map(cardHTML).join('')}</div></div>`;
  }
  CAT_ORDER.forEach(k=>{
    const items=list.filter(c=>c.category===k);if(!items.length)return;
    const cat=CATS[k];
    const open=expandedCats.has(k);
    html+=`<div class="cat-section" data-cat="${k}"><div class="cat-header">
      <span class="cat-dot" style="--cd:var(${cat.cat})"></span>
      <h2>${cat.label}</h2><span class="cat-count">${items.length}</span>
      <button class="cat-expand ${open?'open':''}" data-expand="${k}">
        <span class="ex-label">${open?'Show less':'Show all'}</span>
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
      </button></div>
      <div class="grid" data-grid="${k}">${items.map(cardHTML).join('')}</div></div>`;
  });
  wrap.innerHTML=html;
  document.querySelectorAll('.star').forEach(btn=>btn.onclick=e=>{e.stopPropagation();toggleStar(btn.dataset.star)});
  document.querySelectorAll('.card').forEach(card=>card.onclick=()=>openDetail(card.dataset.id));
  document.querySelectorAll('.cat-expand').forEach(btn=>btn.onclick=()=>{
    const k=btn.dataset.expand;
    if(expandedCats.has(k))expandedCats.delete(k);else expandedCats.add(k);
    renderGrid();
  });
  applyRowClamp();
}

// Show only the first row of cards per category unless expanded.
function applyRowClamp(){
  document.querySelectorAll('.cat-section[data-cat] .grid[data-grid]').forEach(grid=>{
    const k=grid.dataset.grid;
    const cards=[...grid.children];
    cards.forEach(c=>c.style.display='');
    const btn=document.querySelector('.cat-expand[data-expand="'+k+'"]');
    if(expandedCats.has(k)){if(btn)btn.style.visibility='';return}
    // measure cards in the first row by their top offset
    if(!cards.length)return;
    const firstTop=cards[0].offsetTop;
    let perRow=cards.filter(c=>c.offsetTop===firstTop).length;
    if(perRow<1)perRow=1;
    if(cards.length<=perRow){if(btn)btn.style.visibility='hidden';return}
    if(btn)btn.style.visibility='';
    cards.forEach((c,i)=>{if(i>=perRow)c.style.display='none'});
  });
}
window.addEventListener('resize',()=>{clearTimeout(window._rc);window._rc=setTimeout(applyRowClamp,150)});

function toggleStar(cid){
  const c=state.find(x=>x.id===cid);if(!c)return;
  const updated={...c,starred:!c.starred};
  upsertCampaign(updated);
}

function openDetail(cid){
  const c=state.find(x=>x.id===cid);if(!c)return;
  const cat=CATS[c.category],st=computeStatus(c);
  const dur=(c.start&&c.end)?daysBetween(c.start,c.end):0;
  const dl=daysLeft(c);
  let dlCell = st==="progress" ? (dl>=0?dl:0)+" days left" : st==="notstarted" ? (c.start?"Starts "+fmtDate(c.start):"Not set") : "Ended";
  const k=c.kpi||{PC:{},PA:{},CC:{}};
  const exp=expectedPlacements(c.priority);
  const lifeIdx=LIFECYCLE.indexOf(c.lifecycle);
  const lifeHTML=LIFECYCLE.map((s,i)=>`<div class="life-step ${i<=lifeIdx?'done':''}"><span class="dot"></span>${s}${i<LIFECYCLE.length-1?'<span class="sep"></span>':''}</div>`).join('');
  const editions=Math.max(1,Number(c.editions)||1);
  const ranges=computeEditionRanges(c.start,c.end,editions);
  const pl=normalizePlacements(c);
  const editionsHTML=ranges.map(r=>{
    const assetsForEd=PLACEMENTS.map(p=>{
      const dt=(pl[p.key].dates||[])[r.idx-1]||"";
      return dt
        ? `<div class="ed-asset"><span class="ed-asset-name">${p.label}</span><span class="ed-asset-date">${fmtDate(dt)}</span></div>`
        : `<div class="ed-asset off"><span class="ed-asset-name">${p.label}</span><span class="ed-asset-date">—</span></div>`;
    }).join('');
    return `<div class="ed-block">
      <div class="ed-head">
        <span class="ed-badge">Edition ${r.idx}</span>
        <span class="ed-range">${r.start?fmtDate(r.start):'—'} → ${r.end?fmtDate(r.end):'—'}${r.days?` · ${r.days} days`:''}</span>
      </div>
      <div class="ed-assets">${assetsForEd}</div>
    </div>`;
  }).join('');
  document.getElementById('detailModal').innerHTML=`
    <button class="x" onclick="closeDetail()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
    <div class="mtags">
      <span class="cat-tag" style="--cat:var(${cat.cat});--catbg:var(${cat.bg})">${cat.label}</span>
      <span class="pri pri-${c.priority}">${PRI_LABEL[c.priority]}</span>
      <span class="status s-${st}">${STATUS_LABEL[st]}</span>
    </div>
    <h2>${esc(c.name)}</h2>
    <div class="mwallet">${esc(c.wallet||'—')}</div>

    <div class="sec"><div class="sec-t">Schedule & owner</div>
      <div class="dl">
        <div class="cell"><div class="dt">Start</div><div class="dd">${fmtDate(c.start)}</div></div>
        <div class="cell"><div class="dt">End</div><div class="dd">${fmtDate(c.end)}</div></div>
        <div class="cell"><div class="dt">Duration</div><div class="dd">${dur} days · ${dlCell}</div></div>
        <div class="cell"><div class="dt">Key Account Manager</div><div class="dd">${esc(c.manager||'—')}</div></div>
      </div>
    </div>

    <div class="sec"><div class="sec-t">KPIs — achievement / target</div>
      <div class="kpi-grid">
        ${['PC','PA','CC'].map(m=>{const x=k[m]||{};return `<div class="kpi-box"><div class="kl">${m}</div><div class="kv">${fmtNum(x.a)}</div><div class="ka">of ${fmtNum(x.t)} · ${pct(x.a,x.t)}%</div></div>`}).join('')}
      </div>
    </div>

    <div class="sec"><div class="sec-t">Lifecycle</div><div class="life">${lifeHTML}</div></div>

    <div class="sec"><div class="sec-t">Editions & asset schedule (${editions} edition${editions>1?'s':''})</div>
      <div class="editions">${editionsHTML}</div>
    </div>

    ${c.notes?`<div class="sec"><div class="sec-t">Notes</div><div style="font-size:14px;line-height:1.6;background:var(--bg);padding:12px 14px;border-radius:var(--radius-sm)">${esc(c.notes)}</div></div>`:''}

    <div class="modal-actions">
      <button class="btn danger" onclick="delCampaign('${c.id}')">Delete</button>
      <button class="btn" onclick="toggleStar('${c.id}');closeDetail()">${c.starred?'★ Unfavorite':'☆ Favorite'}</button>
      <button class="btn" onclick="openForm('${c.id}')">Edit</button>
    </div>`;
  document.getElementById('detailOverlay').classList.add('open');
}

function closeForm(){document.getElementById('formOverlay').classList.remove('open')}

// Renders the per-edition asset-date inputs based on current editions count + dates.
// Preserves any dates the user already typed before a re-render.
function renderEditionEditor(){
  const box=document.getElementById('editionEditor'); if(!box) return;
  const n=Math.max(1,Number((document.getElementById('f_editions')||{}).value)||1);
  const start=(document.getElementById('f_start')||{}).value||"";
  const end=(document.getElementById('f_end')||{}).value||"";
  const ranges=computeEditionRanges(start,end,n);
  // capture existing values keyed by channel+edition so re-render keeps them
  const existing={};
  box.querySelectorAll('input[data-ed]').forEach(inp=>{existing[inp.dataset.ch+'_'+inp.dataset.ed]=inp.value;});
  box.innerHTML=ranges.map(r=>{
    const assets=PLACEMENTS.map(p=>{
      const key=p.key+'_'+r.idx;
      const val=existing[key]!==undefined?existing[key]:( (window._formPlDates&&window._formPlDates[p.key]&&window._formPlDates[p.key][r.idx-1])||"" );
      return `<div class="ed-edit-row">
        <label>${p.label}</label>
        <input type="date" data-ch="${p.key}" data-ed="${r.idx}" value="${val}"
          min="${r.start||''}" max="${r.end||''}">
      </div>`;
    }).join('');
    return `<div class="ed-edit-block">
      <div class="ed-edit-head">
        <span class="ed-badge">Edition ${r.idx}</span>
        <span class="ed-range">${r.start?fmtDate(r.start):'set dates above'}${r.start?` → ${fmtDate(r.end)} · ${r.days} days`:''}</span>
      </div>
      ${assets}
    </div>`;
  }).join('');
}

function updatePriHint(){
  const pri=document.getElementById('f_priority').value;
  const exp=expectedPlacements(pri);
  const names=exp.map(k=>PLACEMENTS.find(p=>p.key===k).label);
  const hint=document.getElementById('priHint');
  if(hint)hint.textContent=PRI_LABEL[pri]+" priority → suggested channels: "+names.join(", ");
}





function saveForm(cid){
  const g=i=>{const el=document.getElementById(i);return el?el.value:''};
  const name=g('f_name').trim();
  if(!name){alert('Campaign name is required.');return}
  const kpi={};['PC','PA','CC'].forEach(m=>{kpi[m]={t:Number(g('kpi_'+m+'_t'))||0,a:Number(g('kpi_'+m+'_a'))||0}});
  const editions=Math.max(1,Number(g('f_editions'))||1);
  // Collect per-edition asset dates from the edition editor inputs.
  const placements={};PLACEMENTS.forEach(p=>{placements[p.key]={dates:Array.from({length:editions},()=>"" )}});
  document.querySelectorAll('#editionEditor input[data-ed]').forEach(inp=>{
    const ch=inp.dataset.ch, ed=Number(inp.dataset.ed)-1;
    if(placements[ch]&&ed>=0&&ed<editions)placements[ch].dates[ed]=inp.value||"";
  });
  const obj={
    name, wallet:g('f_wallet').trim(), category:g('f_category'), priority:g('f_priority'),
    manager:g('f_manager'), start:g('f_start'), end:g('f_end'),
    kpi, lifecycle:g('f_lifecycle'), editions, placements, notes:g('f_notes').trim()
  };
  let campaign;
  if(cid){const cur=state.find(x=>x.id===cid)||{};campaign={...cur,...obj,id:cid};}
  else{campaign={...obj,id:id(),starred:false};}
  closeForm();
  upsertCampaign(campaign);
}
function delCampaign(cid){if(!confirm('Delete this campaign? This cannot be undone.'))return;closeDetail();deleteCampaignDB(cid);}

function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}

/* ---------- Import / Export ---------- */
const IMPORT_TYPE={'rewards':'rewards','reward':'rewards','cashback - merchant funded':'mfc','merchant funded cashback':'mfc','mfc':'mfc','cashback - joint':'jfc','joint funded cashback':'jfc','jfc':'jfc','channel':'channel','discounts':'discounts','discount':'discounts','clm':'clm'};
const IMPORT_KAM={'tanveer':'Syed Mustafa Tanveer Hasan','tanvir':'Md. Tanvir Rahman','syed mustafa tanveer hasan':'Syed Mustafa Tanveer Hasan','md. tanvir rahman':'Md. Tanvir Rahman'};
const IMPORT_PRI={'urgent':'urgent','high':'high','normal':'normal','low':'low'};
function normHdr(s){return String(s||'').trim().toLowerCase()}
function excelDate(v){
  if(v==null||v==='')return"";
  if(typeof v==='number'){const d=new Date(Math.round((v-25569)*864e5));return isNaN(d)?"":d.toISOString().slice(0,10)}
  const d=new Date(v);return isNaN(d)?"":d.toISOString().slice(0,10);
}
function findCol(headers,names){for(let i=0;i<headers.length;i++){if(names.includes(normHdr(headers[i])))return i}return -1}

function parseSheetRows(rows){
  // rows: array of arrays. Find header row containing "campaign name".
  let hi=-1;
  for(let i=0;i<Math.min(rows.length,6);i++){if(rows[i].some(c=>normHdr(c)==='campaign name')){hi=i;break}}
  if(hi<0)hi=0;
  const H=rows[hi].map(normHdr);
  const col={
    name:findCol(H,['campaign name','name']),
    wallet:findCol(H,['wallet no','wallet no.','wallet']),
    start:findCol(H,['start date','start']),
    end:findCol(H,['due date','end date','end']),
    priority:findCol(H,['priority']),
    lifecycle:findCol(H,['lifecycle']),
    ctype:findCol(H,['campaign type','type']),
    kam:findCol(H,['kam','key account manager','manager']),
    cc:findCol(H,['cc']),pa:findCol(H,['pa']),pc:findCol(H,['pc']),
  };
  // placement columns: first occurrence after type/kam
  const pcol={};
  [['offer','offer section'],['push','push notification'],['fborganic','fb organic'],['hero','hero banner'],['fbpaid','fb paid promotion']].forEach(([k,label])=>{pcol[k]=findCol(H,[label])});
  const out=[];
  for(let r=hi+1;r<rows.length;r++){
    const row=rows[r];if(!row)continue;
    const nm=col.name>=0?String(row[col.name]||'').trim():'';
    if(!nm||normHdr(nm)==='campaign name')continue;
    const ct=col.ctype>=0?IMPORT_TYPE[normHdr(row[col.ctype])]:null;
    const editions=1;
    const placements={};PLACEMENTS.forEach(p=>{placements[p.key]={dates:[""]}});
    const kpi={};
    [['PC','pc'],['PA','pa'],['CC','cc']].forEach(([m,c])=>{const ci=col[c];let t=0;if(ci>=0){const v=parseFloat(row[ci]);if(!isNaN(v))t=Math.round(v*100)/100}kpi[m]={t,a:0}});
    out.push({
      name:nm,
      wallet:col.wallet>=0?String(row[col.wallet]||'').split('.')[0].trim():'',
      category:ct||'rewards',
      priority:col.priority>=0?(IMPORT_PRI[normHdr(row[col.priority])]||'normal'):'normal',
      manager:col.kam>=0?(IMPORT_KAM[normHdr(row[col.kam])]||''):'',
      start:col.start>=0?excelDate(row[col.start]):"",
      end:col.end>=0?excelDate(row[col.end]):"",
      kpi,
      lifecycle:col.lifecycle>=0&&LIFECYCLE.includes(String(row[col.lifecycle]).trim())?String(row[col.lifecycle]).trim():LIFECYCLE[0],
      placements,editions,notes:'',starred:false
    });
  }
  return out;
}

function handleImportFile(file){
  const reader=new FileReader();
  reader.onload=async e=>{
    try{
      const wb=XLSX.read(e.target.result,{type:'binary'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
      const parsed=parseSheetRows(rows);
      if(!parsed.length){alert('No campaigns found in that file. Check it has a "Campaign Name" column.');return}
      const mode=confirm(parsed.length+' campaigns found.\n\nOK = ADD these as new campaigns.\nCancel = MERGE into existing (match by wallet/name, update duplicates).');
      let toSave=[];
      if(mode){
        parsed.forEach(p=>{p.id=id();toSave.push(p);});
      }else{
        parsed.forEach(p=>{
          const match=state.find(c=>(p.wallet&&c.wallet===p.wallet&&c.name===p.name)||(!p.wallet&&c.name===p.name));
          if(match){toSave.push({...match,...p,id:match.id,starred:match.starred});}
          else{p.id=id();toSave.push(p);}
        });
      }
      const ok=await bulkUpsert(toSave);
      if(ok)alert('Import complete. '+toSave.length+' campaigns saved to the database.');
    }catch(err){console.error(err);alert('Could not read that file. Use a .xlsx or .csv export.');}
  };
  reader.readAsBinaryString(file);
}

function exportData(){
  const headers=['Campaign Name','Wallet No','Start Date','Due Date','Status','Priority','Lifecycle','Campaign Type','KAM','Editions','Offer Section Dates','Push Notification Dates','FB Organic Dates','Hero Banner Dates','FB Paid Promotion Dates','PC','PA','CC'];
  const rows=[headers];
  state.forEach(c=>{
    const k=c.kpi||{};
    const pl=normalizePlacements(c);
    rows.push([c.name,c.wallet,c.start,c.end,STATUS_LABEL[computeStatus(c)],PRI_LABEL[c.priority]||'',c.lifecycle||'',(CATS[c.category]||{}).label||'',c.manager||'',
      Math.max(1,Number(c.editions)||1),
      ...PLACEMENTS.map(p=>(pl[p.key].dates||[]).filter(Boolean).join(', ')),
      (k.PC||{}).t||'',(k.PA||{}).t||'',(k.CC||{}).t||'']);
  });
  const ws=XLSX.utils.aoa_to_sheet(rows);
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Campaigns');
  XLSX.writeFile(wb,'content-campaigns-export.xlsx');
}

/* ---------- AI: Fill from file (inside New campaign form) ---------- */
function wireAIZone(){
  const zone=document.getElementById('aiZone'); if(!zone) return;
  const file=document.getElementById('aiFile');
  const pick=document.getElementById('aiPick');
  const drop=document.getElementById('aiDrop');
  pick.onclick=()=>file.click();
  file.onchange=e=>{ if(e.target.files[0]){ runAIFromFile(e.target.files[0]); e.target.value=''; } };
  // Drag & drop
  ['dragenter','dragover'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.add('drag')}));
  ['dragleave','drop'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.remove('drag')}));
  drop.addEventListener('drop',e=>{ const f=e.dataTransfer.files&&e.dataTransfer.files[0]; if(f) runAIFromFile(f); });
}

function readFileAsDataURL(f){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>res(r.result);           // "data:<mime>;base64,...."
    r.onerror=()=>rej(new Error('Could not read file'));
    r.readAsDataURL(f);
  });
}

async function runAIFromFile(f){
  const status=document.getElementById('aiStatus');
  const zone=document.getElementById('aiZone');
  if(f.size>25*1024*1024){ status.className='ai-status err'; status.textContent='File is over 25 MB — please use a smaller file.'; return; }
  zone.classList.add('busy');
  status.className='ai-status'; status.innerHTML='<span class="ai-spin"></span> Reading “'+esc(f.name)+'” with Claude…';
  try{
    const dataUrl=await readFileAsDataURL(f);
    const comma=dataUrl.indexOf(',');
    const b64=dataUrl.slice(comma+1);
    const mime=(dataUrl.slice(5,comma).split(';')[0])||f.type||'application/octet-stream';
    const resp=await fetch('/api/extract',{
      method:'POST',
      headers:{'content-type':'application/json'},
      body:JSON.stringify({ filename:f.name, mime, data:b64 })
    });
    const out=await resp.json();
    if(!resp.ok||out.ok===false){
      zone.classList.remove('busy');
      status.className='ai-status err';
      status.textContent='Error: '+((out&&out.error)||('HTTP '+resp.status))+(out&&out.detail?(' — '+String(out.detail).slice(0,200)):'');
      return;
    }
    applyExtractToForm(out.campaign||{});
    zone.classList.remove('busy');
    status.className='ai-status ok';
    status.textContent='✓ Filled from “'+f.name+'”. Highlighted fields were read from the file — please review, then save.';
  }catch(err){
    zone.classList.remove('busy');
    status.className='ai-status err';
    status.textContent='Could not process the file: '+String(err&&err.message||err);
  }
}

// Write extracted values straight into the already-open form, and highlight what was filled.
function applyExtractToForm(c){
  const setVal=(id,val)=>{
    const el=document.getElementById(id);
    if(!el||val==null||val==='') return false;
    el.value=val; el.classList.add('ai-filled'); return true;
  };
  setVal('f_name',c.name);
  setVal('f_wallet',c.wallet);
  if(c.category) setVal('f_category',c.category);
  if(c.priority) setVal('f_priority',c.priority);
  if(c.manager) setVal('f_manager',c.manager);
  setVal('f_start',c.start);
  setVal('f_end',c.end);
  if(c.lifecycle) setVal('f_lifecycle',c.lifecycle);
  setVal('f_notes',c.notes);
  ['PC','PA','CC'].forEach(m=>{
    const v=c.kpi&&c.kpi[m]!=null&&c.kpi[m]!==''?c.kpi[m]:'';
    if(v!=='') setVal('kpi_'+m+'_t',v);
  });
  updatePriHint(); // re-evaluate placement enabling for the new priority
}

/* ---------- Sidebar ---------- */
const SB_KEY='cc_sb_collapsed';
function isMobile(){return window.matchMedia('(max-width:760px)').matches;}
function setSidebarCollapsed(v){
  document.body.classList.toggle('sb-collapsed',v);
  try{localStorage.setItem(SB_KEY,v?'1':'0');}catch(e){}
  const t=document.getElementById('sbToggle');if(t)t.title=v?'Expand sidebar':'Collapse sidebar';
}
(function initSidebar(){
  // restore desktop collapse preference (mobile always starts closed)
  let collapsed=false; try{collapsed=localStorage.getItem(SB_KEY)==='1';}catch(e){}
  if(!isMobile()) document.body.classList.toggle('sb-collapsed',collapsed);
  const toggle=document.getElementById('sbToggle');
  const fab=document.getElementById('sbFab');
  const scrim=document.getElementById('sbScrim');
  toggle.onclick=()=>{
    if(isMobile()){ document.body.classList.remove('sb-open'); }   // acts as close on mobile
    else{ setSidebarCollapsed(!document.body.classList.contains('sb-collapsed')); }
  };
  if(fab)fab.onclick=()=>document.body.classList.add('sb-open');
  if(scrim)scrim.onclick=()=>document.body.classList.remove('sb-open');
  document.querySelectorAll('.sb-item').forEach(btn=>btn.onclick=()=>{
    const tool=btn.dataset.tool;
    if(isMobile()) document.body.classList.remove('sb-open');
    handleTool(tool);
  });
})();

const TOOL_INFO={
  hero:{title:"Hero Banner Schedule",desc:"A calendar view of every hero banner slot across your campaigns, so you can spot clashes and open dates at a glance."},
  marketing:{title:"Marketing Export",desc:"A ready-to-send export tailored for the marketing team — asset dates and channels per campaign, formatted for their workflow."},
  pn:{title:"PN Scheduling",desc:"Plan and queue push notifications against each edition, with reminders for what still needs a send date."},
  analysis:{title:"Full Analysis Export",desc:"A complete workbook — KPIs, placements, editions, and status — for deeper reporting and review."}
};
function handleTool(tool){
  if(tool==='export'){ exportData(); return; }
  const info=TOOL_INFO[tool]; if(!info) return;
  showComingSoon(info.title,info.desc);
}
function showComingSoon(title,desc){
  document.getElementById('soonModal').innerHTML=`
    <button class="x" onclick="closeSoon()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
    <div class="soon-badge">Coming soon</div>
    <h2>${title}</h2>
    <p class="soon-desc">${desc}</p>
    <div class="modal-actions"><button class="btn primary" onclick="closeSoon()">Got it</button></div>`;
  document.getElementById('soonOverlay').classList.add('open');
}
function closeSoon(){document.getElementById('soonOverlay').classList.remove('open');}

document.getElementById('addBtn').onclick=()=>openForm(null);
function syncStatusChips(){
  document.querySelectorAll('#statusFilters .chip').forEach(c=>{
    if(c.dataset.status==='all') c.classList.toggle('active', statusFilter.size===0);
    else c.classList.toggle('active', statusFilter.has(c.dataset.status));
  });
}
document.querySelectorAll('#statusFilters .chip').forEach(chip=>chip.onclick=()=>{
  const s=chip.dataset.status;
  if(s==='all'){
    statusFilter.clear();               // "All" = no filter, show everything
  }else{
    statusFilter.has(s)?statusFilter.delete(s):statusFilter.add(s);  // toggle this status
  }
  syncStatusChips();
  renderGrid();
});
document.getElementById('search').oninput=renderGrid;
document.getElementById('sortBy').onchange=renderGrid;
['detailOverlay','formOverlay','soonOverlay'].forEach(oid=>{document.getElementById(oid).addEventListener('click',e=>{if(e.target.id===oid)e.target.classList.remove('open')})});
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeDetail();closeForm();closeSoon();document.body.classList.remove('sb-open')}});

// Paint from cache immediately, then connect to Supabase and load the live data.
renderGrid();
if(initSupabase()){
  loadFromDB();
}else{
  setSyncBadge('config','Set Supabase keys in the file');
}
